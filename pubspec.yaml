name: whyy_cloud_flutter
description: "Whyy Cloud — Run uncensored local LLMs natively on any device."
publish_to: 'none'
version: 1.2.0+101

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ── LLM Engine ──────────────────────────────────────────────────
  llamadart: ^0.6.10

  # ── State Management ────────────────────────────────────────────
  get: ^4.7.2                      # GetX - controllers, routing, state

  # ── Local Storage ───────────────────────────────────────────────
  hive_flutter: ^1.1.0             # Hive with Flutter init helpers
  hive: ^2.2.3                     # Hive core key-value + box storage

  # ── Networking / Downloads ──────────────────────────────────────
  http: ^1.2.2                     # HTTP requests + model downloading

  # ── File System ─────────────────────────────────────────────────
  path_provider: ^2.1.5            # App documents / downloads dir
  path: ^1.9.1                     # Path string utilities
  file_picker: ^8.1.7              # Cross-platform file/folder picker

  # ── UI Helpers ───────────────────────────────────────────────────
  flutter_markdown: ^0.7.6         # Render AI markdown responses
  google_fonts: ^6.2.1             # Inter font (matching FastChatUI)
  percent_indicator: ^4.2.4        # Download progress bars
  flutter_animate: ^4.5.0          # Micro-animations
  speech_to_text: ^7.0.0           # Mobile speech recognition for voice input
  flutter_tts: ^4.0.2              # Speak assistant replies aloud
  cupertino_icons: ^1.0.8

  # ── Background / Wake Lock ─────────────────────────────────────
  wakelock_plus: ^1.2.10             # Keep screen on during downloads
  flutter_foreground_task: ^9.2.2    # Foreground service for downloads/inference
  disable_battery_optimization: ^1.1.1 # Guide users to disable battery optimization
  package_info_plus: ^9.0.1
  open_filex: ^4.7.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1           # Hive type adapter code gen
  build_runner: ^2.4.13            # Code generation runner
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.9.2

hooks:
  user_defines:
    llamadart:
      llamadart_native_backends:
        platforms:
          linux-x64: [vulkan]
          windows-x64: [vulkan]
          android-arm64: [cpu, vulkan, opencl]

flutter:
  uses-material-design: true
  assets:
    - assets/models_catalog.json
    - assets/WhyyCloud.png
    - assets/playstore-icon.png

flutter_icons:
  android: true
  ios: true
  image_path: assets/WhyyCloud.png

dependency_overrides:
  archive: ^4.0.7
  image: ^3.2.2
